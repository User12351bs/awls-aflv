<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Player Limpio</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0b0f14; color:#e5e7eb; display:flex; flex-direction:column; min-height:100vh; }
    header { background:#0f172a; padding:12px; text-align:center; border-bottom:1px solid rgba(255,255,255,.1); }
    header h1 { margin:0; font-size:16px; color:#cbd5e1; }
    .selector { display:flex; justify-content:center; gap:10px; padding:10px; background:#1e293b; }
    .selector button { padding:6px 14px; border:none; border-radius:8px; cursor:pointer; background:#334155; color:#fff; }
    .selector button.active { background:#22c55e; color:#06210f; font-weight:bold; }
    .servers { display:flex; justify-content:center; flex-wrap:wrap; gap:12px; padding:12px; background:#111827; }
    .servers button { padding:8px 14px; border:none; border-radius:8px; cursor:pointer; background:#2563eb; color:#fff; }
    .servers button:hover { background:#1d4ed8; }
    #player { flex:1; display:flex; align-items:center; justify-content:center; background:#000; }
    #player iframe { width:100%; height:100%; border:0; }
    footer { background:#0f172a; padding:12px; text-align:center; border-top:1px solid rgba(255,255,255,.1); }
    footer button { padding:10px 16px; border:none; border-radius:12px; background:#22c55e; color:#06210f; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>
  <header>
    <h1>Reproductor Limpio — Dandadan Capítulo</h1>
  </header>

  <!-- Selector de idioma -->
  <div class="selector">
    <button class="active" onclick="selectLang('SUB', this)">SUB</button>
    <button onclick="selectLang('LAT', this)">LAT</button>
    <button onclick="selectLang('ES', this)">ES</button>
  </div>

  <!-- Servidores -->
  <div class="servers" id="server-list"></div>

  <!-- Contenedor del reproductor -->
  <div id="player">
    <p>Elige un servidor para empezar a ver el capítulo</p>
  </div>

  <footer>
    <button onclick="window.location.href='https://www.google.es'">Volver</button>
  </footer>

  <script>
    // URLs de servidores por idioma
    const servers = {
      SUB: {
        Mixdrop: "https://mixdropjmk.pw/e/qle6dj8qiq1r00",
        Streamtape: "https://streamtape.com/e/9evVZJ889bsar0j",
        Netu: "https://netuplayer.top/e/alByaEx2b1lib3dMM3ZzSThMNStHQT09"
      },
      LAT: {
        Mixdrop: "https://mixdropjmk.pw/e/6q6dr1m1t11en7",
        Streamtape: "https://streamtape.com/e/grxOLxVGyDIqKrP",
        Netu: "https://netuplayer.top/e/dVRGU0xJeWVjZjVUUWNGK0Z4K0J4Zz09"
      },
      ES: {
        Mixdrop: "https://mixdropjmk.pw/e/rwqn77jvu166zo",
        Streamtape: "https://streamtape.com/e/JqZ6eYxgBYtjBM7",
        Netu: "https://netuplayer.top/e/blNTdDk0Q29OKzlzZ2JEY2RLZ0xtQT09"
      }
    };

    let currentLang = "SUB";

    function selectLang(lang, btn) {
      currentLang = lang;
      document.querySelectorAll('.selector button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderServers();
    }

    function renderServers() {
      const list = document.getElementById('server-list');
      list.innerHTML = '';
      Object.keys(servers[currentLang]).forEach(name => {
        const url = servers[currentLang][name];
        const btn = document.createElement('button');
        btn.textContent = name;
        btn.onclick = () => loadPlayer(url);
        list.appendChild(btn);
      });
    }

    function loadPlayer(url) {
      document.getElementById('player').innerHTML = `
        <iframe src="${url}" allowfullscreen></iframe>
      `;
    }

    // Inicializa la lista de servidores al cargar
    renderServers();
  </script>
</body>
</html>
