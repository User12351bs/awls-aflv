<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Política CSP optimizada -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; frame-ancestors 'self' https://lutukisolo.me https: http:" />
  <!-- Política de permisos explícita -->
  <meta http-equiv="Permissions-Policy" content="autoplay=*, encrypted-media=*, accelerometer=*, gyroscope=*, clipboard-write=*" />
  <!-- Añadimos CORS headers via meta -->
  <meta http-equiv="Access-Control-Allow-Origin" content="*" />
  <meta http-equiv="Access-Control-Allow-Methods" content="GET, POST, OPTIONS" />
  <meta http-equiv="Access-Control-Allow-Headers" content="*" />
  <title>Reproductor — saidochesto</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; background: #0b0f14; color: #e5e7eb; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
    header { padding: 12px 16px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.06); }
    header h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .2px; color: #cbd5e1; }
    .frame-wrap { position: relative; flex: 1; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #0b0f14; }
    .footer { display:flex; gap:12px; justify-content:center; align-items:center; padding: 12px; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.06); }
    .btn { appearance: none; border: 0; padding: 10px 16px; border-radius: 14px; font-weight: 600; cursor: pointer; background: #22c55e; color: #06210f; box-shadow: 0 8px 24px rgba(34,197,94,.25); transition: transform .08s ease, box-shadow .2s ease, opacity .2s ease; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(34,197,94,.35); }
    .btn:active { transform: translateY(0); box-shadow: 0 6px 18px rgba(34,197,94,.3); }
    .muted { font-size: 12px; color: #94a3b8; }
    .log { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; color: #a5b4fc; }
    .error-message { display: none; padding: 10px; background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.2); border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Reproductor: saidochesto.top</h1>
  </header>

  <div class="frame-wrap">
    <div id="error-message" class="error-message"></div>
    <!-- 
      Configuración optimizada del iframe:
      1. Añadimos todos los permisos necesarios en el atributo allow
      2. Mantenemos sandbox con los permisos necesarios
      3. Añadimos loading="lazy" para mejorar rendimiento
      4. Añadimos importance="high" para priorizar la carga
    -->
    <iframe id="emulador" 
            src="https://saidochesto.top/embed.php?id=45878"
            sandbox="allow-scripts allow-forms allow-popups allow-pointer-lock allow-top-navigation-by-user-activation allow-same-origin"
            referrerpolicy="no-referrer"
            allow="fullscreen; autoplay *; encrypted-media *; accelerometer *; gyroscope *; clipboard-write *"
            loading="lazy"
            importance="high">
    </iframe>
  </div>

  <div class="footer">
    <button class="btn" id="volver">Volver</button>
    <span class="muted">Consejo: abre la consola del navegador para ver los mensajes de control <span class="log">(console.log)</span>.</span>
  </div>

  <script>
    // Configuración de referrer para ayudar con CORS
    const meta = document.createElement('meta');
    meta.name = 'referrer';
    meta.content = 'origin';
    document.head.appendChild(meta);

    // Botón Volver
    document.getElementById('volver').addEventListener('click', () => {
      location.assign('https://www.google.es');
    });

    // Gestión proactiva de popups/anuncios
    (function hardenTopOpen(){
      const originalOpen = window.open;

      function trapOpen(url, name, specs) {
        let popupRef = null;
        try {
          popupRef = originalOpen.call(window, url, name, specs);
        } catch(err) {
          console.log('Popup bloqueado:', err.message);
        }

        if (popupRef && typeof popupRef.close === 'function') {
          try { popupRef.close(); } catch(_) {}
        }

        console.log('Anuncio interceptado y cerrado');
        return null;
      }

      // Instalamos el gancho y lo hacemos difícil de sobreescribir
      Object.defineProperty(window, 'open', {
        configurable: false,
        enumerable: true,
        get: () => trapOpen,
        set: () => true
      });

      try {
        Object.defineProperty(window.top, 'open', {
          configurable: false,
          enumerable: true,
          get: () => trapOpen,
          set: () => true
        });
      } catch(_) {}

      try { window.opener = null; } catch(_) {}

      window.addEventListener('blur', () => {
        console.log('Posible intento de popunder detectado');
      });
    })();

    // Protección para clics
    document.addEventListener('click', () => {
      const savedOpen = window.open;
      window.open = function() { console.log('Intento de apertura bloqueado'); return null; };
      setTimeout(() => { window.open = savedOpen; }, 0);
    }, true);

    // Manejador de errores mejorado
    window.addEventListener('error', function(event) {
      console.log('Error capturado:', event.message);
      
      // Ignoramos errores específicos que no afectan la funcionalidad
      if (event.message.includes('cookieIndex') || 
          event.message.includes('.onion') || 
          event.message.includes('CORS')) {
        event.preventDefault();
        return;
      }
      
      // Mostramos errores críticos al usuario
      const errorDiv = document.getElementById('error-message');
      if (errorDiv && event.message) {
        errorDiv.textContent = 'Error: ' + event.message;
        errorDiv.style.display = 'block';
      }
    });

    // Definimos cookieIndex para evitar el error
    window.cookieIndex = {};
    
    // Manejador para mensajes del iframe
    window.addEventListener('message', function(event) {
      // Verificamos origen para seguridad
      if (event.origin.includes('saidochesto.top')) {
        console.log('Mensaje recibido del iframe:', event.data);
      }
    });

    // Recargar iframe si hay problemas
    let iframeLoadAttempts = 0;
    const iframe = document.getElementById('emulador');
    
    iframe.onerror = function() {
      if (iframeLoadAttempts < 3) {
        console.log('Error al cargar iframe, reintentando...');
        setTimeout(() => {
          iframe.src = iframe.src;
          iframeLoadAttempts++;
        }, 1000);
      }
    };
  </script>
</body>
</html>
