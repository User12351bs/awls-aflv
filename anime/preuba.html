<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emulador — Black Clover Cap. 5</title>
  <style>
    :root {
      --bg:#0b0f14; --panel:#0f172a; --muted:#94a3b8; --fg:#e5e7eb; --accent:#22c55e; --danger:#ef4444;
    }
    * { box-sizing: border-box; }
    html,body { height:100%; margin:0; }
    body { display:flex; flex-direction:column; background:var(--bg); color:var(--fg); font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
    header, footer { background:var(--panel); border-color:rgba(255,255,255,.08); }
    header { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; gap:12px; }
    header h1 { margin:0; font-size:15px; color:#cbd5e1; font-weight:600; letter-spacing:.2px; }
    .frame-wrap { position:relative; flex:1; min-height:0; }
    iframe { position:absolute; inset:0; width:100%; height:100%; border:0; background:#000; }
    footer { padding:12px; border-top:1px solid rgba(255,255,255,.08); display:flex; gap:10px; justify-content:center; align-items:center; }
    .btn { appearance:none; border:0; padding:10px 16px; border-radius:12px; font-weight:600; cursor:pointer; transition: transform .08s ease, box-shadow .2s ease; }
    .btn-primary { background:var(--accent); color:#06210f; box-shadow:0 8px 24px rgba(34,197,94,.25); }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 12px 28px rgba(34,197,94,.35); }
    .muted { font-size:12px; color:var(--muted); }

    /* Modal */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:99999; }
    .modal { width:min(560px, calc(100% - 32px)); background:#111827; border:1px solid rgba(255,255,255,.08); border-radius:16px; padding:18px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
    .modal h2 { margin:0 0 8px; font-size:18px; }
    .modal p { margin:0 0 14px; color:#cbd5e1; }
    .modal .row { display:flex; gap:10px; justify-content:flex-end; }
    .btn-danger { background:var(--danger); color:#fff; }
  </style>
</head>
<body>
  <header>
    <h1>Emulador: ww3.animeonline.ninja — Black Clover Cap. 5</h1>
    <span class="muted">Los popups y redirecciones quedan bloqueados automáticamente.</span>
  </header>

  <div class="frame-wrap">
    <!--
      Sandbox estricto:
      - SIN allow-popups: bloquea nuevas pestañas/ventanas desde el iframe.
      - SIN allow-top-navigation-by-user-activation: impide que el iframe cambie la URL de esta página.
      - Con allow-scripts/allow-forms/allow-same-origin para que el sitio funcione lo máximo posible.
    -->
    <iframe id="emulador"
            src="https://ww3.animeonline.ninja/episodio/black-clover-cap-5/"
            sandbox="allow-scripts allow-forms allow-same-origin"
            referrerpolicy="no-referrer"
            loading="eager">
    </iframe>
  </div>

  <footer>
    <button class="btn btn-primary" id="volver">Volver</button>
    <span class="muted">Abre la consola para ver logs de control.</span>
  </footer>

  <!-- Modal aviso navegación bloqueada -->
  <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <h2>Navegación bloqueada</h2>
      <p>No puedes navegar por animeonline.ninja desde aquí. Te hemos devuelto al episodio original.</p>
      <div class="row">
        <button class="btn btn-primary" id="modal-ok">Entendido</button>
        <button class="btn btn-danger" id="modal-salir">Salir</button>
      </div>
    </div>
  </div>

  <script>
    const TARGET_URL = 'https://ww3.animeonline.ninja/episodio/black-clover-cap-5/';
    const iframe = document.getElementById('emulador');

    // Botón Volver
    document.getElementById('volver').addEventListener('click', () => {
      location.assign('https://www.google.es');
    });

    // ----- Intercepción de popups/ventanas nuevas -----
    (function trapOpen(){
      const originalOpen = window.open;
      function blocker(url, name, specs){
        let w = null;
        try { w = originalOpen.call(window, url, name, specs); } catch(_) {}
        if (w && w.close) { try { w.close(); } catch(_) {} }
        console.log('anuncio cerrado correctamente');
        // además mostramos modal para informar
        showBlockedNav();
        return null;
      }
      Object.defineProperty(window, 'open', { configurable:false, enumerable:true, get:()=>blocker, set:()=>true });
      try { Object.defineProperty(window.top, 'open', { configurable:false, enumerable:true, get:()=>blocker, set:()=>true }); } catch(_) {}

      // Anti-popunder: tras cualquier interacción, bloqueamos llamadas en el siguiente tick
      document.addEventListener('click', () => {
        const saved = window.open; window.open = blocker; setTimeout(()=>{ window.open = saved; }, 0);
      }, true);
    })();

    // ----- Intentos de navegación del iframe -----
    // Nota: por políticas de seguridad, no podemos leer la URL interna del iframe si cambia.
    // En su lugar, prevenimos que cambie el top y que abra popups mediante el sandbox, y monitorizamos "señales" indirectas.

    // Si el iframe intenta forzar navegación del top, el sandbox lo bloquea. Mostramos el modal en ciertos indicios.
    // Heurística: si el iframe dispara focus/blur extraños o el documento pierde visibilidad justo tras interacción.
    (function navHeuristics(){
      let lastUserAction = 0;
      const bump = ()=> lastUserAction = Date.now();
      document.addEventListener('click', bump, true);
      document.addEventListener('keydown', bump, true);

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden' && Date.now() - lastUserAction < 1200){
          // Probable intento de redirección/popunder bloqueado
          console.log('Intento de navegación/redirección bloqueado.');
          showBlockedNav();
        }
      });

      // También si el iframe se recarga repetidamente en poco tiempo
      let loads = 0; let t = null;
      iframe.addEventListener('load', () => {
        loads++;
        if (!t){ t = setTimeout(()=>{ loads = 0; t = null; }, 1500); }
        if (loads > 2){
          console.log('Actividad inusual del iframe detectada.');
          showBlockedNav();
        }
      });
    })();

    // ----- Modal helpers -----
    const backdrop = document.getElementById('modal-backdrop');
    function showBlockedNav(){
      // Reafirmamos la URL original por si el src se hubiese alterado vía atributo
      try { if (iframe.getAttribute('src') !== TARGET_URL) iframe.setAttribute('src', TARGET_URL); } catch(_) {}
      backdrop.style.display = 'flex';
    }
    document.getElementById('modal-ok').addEventListener('click', ()=>{ backdrop.style.display = 'none'; });
    document.getElementById('modal-salir').addEventListener('click', ()=>{ location.assign('https://www.google.es'); });
  </script>
</body>
</html>
