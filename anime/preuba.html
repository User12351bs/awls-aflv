<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emulador — Saidochesto</title>
  <style>
    body { margin:0; height:100vh; display:flex; flex-direction:column; background:#0b0f14; color:#e5e7eb; font-family:sans-serif; }
    header, footer { background:#111827; padding:10px; font-size:14px; }
    header { border-bottom:1px solid rgba(255,255,255,.15); }
    footer { border-top:1px solid rgba(255,255,255,.15); display:flex; justify-content:center; gap:10px; }
    iframe { flex:1; border:0; background:#000; width:100%; }
    .btn { padding:8px 16px; border-radius:6px; border:0; cursor:pointer; font-weight:bold; }
    .btn-primary { background:#22c55e; color:#000; }
    .btn-primary:hover { background:#16a34a; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modal { background:#1e293b; padding:20px; border-radius:10px; max-width:400px; text-align:center; }
    .modal h2 { margin:0 0 10px; font-size:18px; }
    .modal p { margin:0 0 15px; font-size:14px; }
  </style>
</head>
<body>
  <header>
    <b>Emulador Saidochesto</b> — los popups y redirecciones se controlan automáticamente
  </header>

  <iframe id="player"
    src="https://www3.animeflv.net/ver/dandadan-2nd-season-7"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"
    referrerpolicy="no-referrer">
  </iframe>

  <footer>
    <button class="btn btn-primary" id="volver">Volver a Google</button>
  </footer>

  <!-- Modal -->
  <div id="modal" class="modal-backdrop">
    <div class="modal">
      <h2>Navegación bloqueada</h2>
      <p>No puedes salir del reproductor desde aquí. Te hemos devuelto al mismo episodio.</p>
      <button class="btn btn-primary" id="ok">Entendido</button>
    </div>
  </div>

  <script>
    const TARGET_URL = "https://www3.animeflv.net/ver/dandadan-2nd-season-7";
    const iframe = document.getElementById("player");
    const modal = document.getElementById("modal");

    // Botón volver
    document.getElementById("volver").onclick = () => location.href = "https://www3.animeflv.net/ver/dandadan-2nd-season-7";
    document.getElementById("ok").onclick = () => modal.style.display = "none";

    // Interceptar popups
    (function(){
      const origOpen = window.open;
      window.open = function(url, name, specs){
        let w = null;
        try { w = origOpen.call(window, url, name, specs); } catch(_) {}
        if (w && w.close) { try { w.close(); } catch(_){} }
        console.log("anuncio cerrado correctamente");
        return null;
      };
    })();

    // Intentos de navegación/redirección
    iframe.addEventListener("load", () => {
      // Si el src cambia a otra cosa distinta al target, lo devolvemos
      if (iframe.getAttribute("src") !== TARGET_URL){
        console.log("Redirección bloqueada");
        iframe.setAttribute("src", TARGET_URL);
        modal.style.display = "flex";
      }
    });
  </script>
</body>
</html>
