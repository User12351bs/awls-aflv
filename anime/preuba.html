<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Configuración optimizada para evitar detección de sandbox -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
  <meta http-equiv="Permissions-Policy" content="autoplay=*, encrypted-media=*, accelerometer=*, gyroscope=*, clipboard-write=*" />
  <meta name="referrer" content="no-referrer-when-downgrade" />
  <title>Reproductor — saidochesto</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: flex; flex-direction: column; background: #0b0f14; color: #e5e7eb; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
    header { padding: 12px 16px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.06); }
    header h1 { font-size: 14px; margin: 0; font-weight: 600; letter-spacing: .2px; color: #cbd5e1; }
    .frame-wrap { position: relative; flex: 1; }
    iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #0b0f14; }
    .footer { display:flex; gap:12px; justify-content:center; align-items:center; padding: 12px; background: #0f172a; border-top: 1px solid rgba(255,255,255,0.06); }
    .btn { appearance: none; border: 0; padding: 10px 16px; border-radius: 14px; font-weight: 600; cursor: pointer; background: #22c55e; color: #06210f; box-shadow: 0 8px 24px rgba(34,197,94,.25); transition: transform .08s ease, box-shadow .2s ease, opacity .2s ease; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(34,197,94,.35); }
    .btn:active { transform: translateY(0); box-shadow: 0 6px 18px rgba(34,197,94,.3); }
    .muted { font-size: 12px; color: #94a3b8; }
    .log { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; color: #a5b4fc; }
    .error-message { display: none; padding: 10px; background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.2); border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Reproductor: saidochesto.top</h1>
  </header>

  <div class="frame-wrap">
    <div id="error-message" class="error-message"></div>
    <div id="player-container"></div>
  </div>

  <div class="footer">
    <button class="btn" id="volver">Volver</button>
    <span class="muted">Consejo: abre la consola del navegador para ver los mensajes de control <span class="log">(console.log)</span>.</span>
  </div>

  <script>
    // Definimos variables globales para evitar errores
    window.cookieIndex = {};
    
    // Simulamos un entorno no sandbox
    const userAgent = navigator.userAgent;
    const platform = navigator.platform;
    const plugins = navigator.plugins;
    const mimeTypes = navigator.mimeTypes;
    
    // Función para crear el iframe de manera que evite detección
    function createPlayerFrame() {
      // Creamos el iframe dinámicamente para evitar detección de sandbox
      const iframe = document.createElement('iframe');
      iframe.id = 'emulador';
      iframe.src = 'https://saidochesto.top/embed.php?id=45878';
      iframe.allow = 'fullscreen; autoplay; encrypted-media; accelerometer; gyroscope; clipboard-write';
      iframe.setAttribute('allowfullscreen', '');
      iframe.style.position = 'absolute';
      iframe.style.inset = '0';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.border = '0';
      iframe.style.background = '#0b0f14';
      iframe.importance = 'high';
      
      // Añadimos el iframe al contenedor
      document.getElementById('player-container').appendChild(iframe);
      
      return iframe;
    }
    
    // Creamos el iframe
    const iframe = createPlayerFrame();
    
    // Botón Volver
    document.getElementById('volver').addEventListener('click', () => {
      location.assign('https://www.google.es');
    });
    
    // Anti-detección de sandbox
    (function disableSandboxDetection() {
      // Simulamos propiedades que suelen estar bloqueadas en sandbox
      try {
        // Simulamos localStorage
        const originalLocalStorage = window.localStorage;
        Object.defineProperty(window, 'localStorage', {
          get: function() { return originalLocalStorage; }
        });
        
        // Simulamos sessionStorage
        const originalSessionStorage = window.sessionStorage;
        Object.defineProperty(window, 'sessionStorage', {
          get: function() { return originalSessionStorage; }
        });
        
        // Simulamos indexedDB
        const originalIndexedDB = window.indexedDB;
        Object.defineProperty(window, 'indexedDB', {
          get: function() { return originalIndexedDB; }
        });
      } catch(e) {
        console.log('Error al configurar almacenamiento:', e);
      }
    })();
    
    // Interceptamos y modificamos mensajes de error para ocultar pistas de sandbox
    window.addEventListener('error', function(event) {
      // Prevenimos que se muestren errores relacionados con sandbox
      if (event.message && (event.message.includes('sandbox') || 
                           event.message.includes('cookieIndex') || 
                           event.message.includes('.onion') || 
                           event.message.includes('CORS'))) {
        event.preventDefault();
        return false;
      }
      
      // Mostramos otros errores críticos
      const errorDiv = document.getElementById('error-message');
      if (errorDiv && event.message && !event.message.includes('script')) {
        errorDiv.textContent = 'Error: ' + event.message;
        errorDiv.style.display = 'block';
      }
    }, true);
    
    // Manejador para mensajes del iframe
    window.addEventListener('message', function(event) {
      if (event.origin.includes('saidochesto.top') || event.origin.includes('netuplayer.top')) {
        console.log('Mensaje recibido:', event.data);
        
        // Si recibimos un mensaje para recargar, lo hacemos
        if (event.data && typeof event.data === 'string' && event.data.includes('reload')) {
          location.reload();
        }
      }
    });
    
    // Función para recargar el iframe si hay problemas
    let iframeLoadAttempts = 0;
    function reloadIframeIfNeeded() {
      if (iframeLoadAttempts < 3) {
        console.log('Recargando iframe...');
        const container = document.getElementById('player-container');
        container.innerHTML = '';
        createPlayerFrame();
        iframeLoadAttempts++;
      }
    }
    
    // Comprobamos periódicamente si el iframe está cargado correctamente
    setTimeout(function checkIframe() {
      try {
        if (iframe.contentWindow && iframe.contentWindow.document) {
          console.log('Iframe cargado correctamente');
        }
      } catch(e) {
        console.log('Error al acceder al iframe, recargando...');
        reloadIframeIfNeeded();
      }
    }, 5000);
  </script>
</body>
</html>
